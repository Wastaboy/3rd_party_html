<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="gate.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3B6E">
<title>__PAGE_TITLE__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1F3B6E; --navy-deep:#142a52; --ink:#0f1f3d;
    --amber:#E08A1E; --amber-soft:#fbe8cd;
    --paper:#F4F5F8; --card:#fff; --line:#e3e6ee; --line-soft:#eef1f7;
    --navy-tint:#eef0f6; --faint:#97a1b4;
    --text:#1b2436; --muted:#5b6678;
    --code-bg:#0f1f3d; --code-text:#e9edf7;
    --ok:#1f8a52; --ok-soft:#e3f3ea;
    --green:#228b57; --red:#c83737; --gray:#788291;
    --radius:14px; --tap:46px; --sh-sm:0 1px 2px rgba(16,31,61,.04);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--text);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:24px;line-height:1.62;-webkit-font-smoothing:antialiased;padding-bottom:calc(64px + env(safe-area-inset-bottom))}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}

  header.mast{background:radial-gradient(120% 140% at 100% 0%, rgba(224,138,30,.22), transparent 55%),linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);color:#fff;padding:calc(28px + env(safe-area-inset-top)) 0 26px;border-bottom:3px solid var(--amber)}
  .mast-inner{display:flex;gap:18px;align-items:center}
  .mast-copy{flex:1;min-width:0}
  .brandmark{flex:none;width:60px;height:60px;border-radius:15px;background:linear-gradient(160deg,#274982,#1a345f);border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 22px -10px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.12);display:grid;place-items:center}
  .kicker{font-family:"IBM Plex Mono",monospace;font-size:16px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);font-weight:500;margin:0 0 10px}
  .mast h1{font-family:"IBM Plex Serif",Georgia,serif;font-weight:600;font-size:42px;line-height:1.12;margin:0 0 8px;letter-spacing:-.01em}
  .mast p.sub{margin:0;color:#c7d2e8;font-size:21px;max-width:48ch}
  .mast .meta{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px}
  .mast .meta span{font-family:"IBM Plex Mono",monospace;font-size:16px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);padding:5px 9px;border-radius:999px;color:#dde6f5}
  .mast .meta span b{color:#fff;font-weight:600}
  @media(max-width:480px){ .brandmark{width:50px;height:50px} .mast h1{font-size:34px} }

  .sticky{position:sticky;top:0;z-index:40;background:rgba(244,245,248,.86);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
  .progress{height:5px;background:var(--line);overflow:hidden}
  .progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--navy),var(--amber));transition:width .35s ease}
  .progtext{font-family:"IBM Plex Mono",monospace;font-size:15px;color:var(--muted);padding:6px 0 8px;display:flex;justify-content:space-between;align-items:center}
  .progtext button{background:none;border:none;color:var(--navy);font-family:inherit;font-size:15px;cursor:pointer;text-decoration:underline;padding:4px}

  section.block{margin:26px 0}
  section.block > h2.sec{font-family:"IBM Plex Serif",serif;font-size:29px;font-weight:600;color:var(--navy);margin:0 0 4px;letter-spacing:-.01em;scroll-margin-top:120px}
  section.block > p.lead{margin:0 0 14px;color:var(--muted);font-size:21px}

  .tldr{background:#fffdf8;border:1px dashed #ecd6ad;border-radius:12px;padding:13px 15px;margin:0 0 15px;font-size:20px}
  .tldr b{display:block;font-family:"IBM Plex Mono",monospace;font-size:15px;letter-spacing:.06em;text-transform:uppercase;color:#a4651a;margin-bottom:4px}

  details.step{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin:12px 0;overflow:hidden;scroll-margin-top:118px;box-shadow:var(--sh-sm)}
  details.step[open]{box-shadow:0 6px 24px -12px rgba(16,31,61,.28);border-color:#d4dae8}
  summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:15px 16px;min-height:var(--tap);user-select:none;-webkit-tap-highlight-color:transparent}
  summary::-webkit-details-marker{display:none}
  summary .num{flex:none;min-width:30px;height:30px;padding:0 5px;border-radius:9px;background:var(--navy);color:#fff;display:grid;place-items:center;font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:18px}
  details.isdone summary .num{background:var(--ok)}
  summary .stitle{flex:1;font-weight:600;font-size:22px;line-height:1.3}
  summary .chev{flex:none;color:var(--muted);transition:transform .2s ease}
  details[open] summary .chev{transform:rotate(90deg)}
  summary .dot{flex:none;width:9px;height:9px;border-radius:50%;border:2px solid var(--line)}
  details.isdone summary .dot{background:var(--ok);border-color:var(--ok)}
  .body{padding:2px 16px 18px;border-top:1px solid var(--line-soft)}
  .body > *:first-child{margin-top:14px}
  .body p{margin:0 0 12px}
  p.do{margin:0 0 12px}
  .body ul,.body ol{margin:0 0 12px;padding-left:22px}.body li{margin:0 0 8px}
  ol.steps2{counter-reset:s2;list-style:none;padding-left:0}
  ol.steps2 > li{position:relative;padding:2px 0 10px 40px;margin:0}
  ol.steps2 > li::before{counter-increment:s2;content:counter(s2);position:absolute;left:0;top:0;width:28px;height:28px;border-radius:8px;background:var(--navy-tint);color:var(--navy);font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:16px;display:grid;place-items:center;border:1px solid #dbe3f5}

  dl.props{margin:0 0 13px;border:1px solid var(--line);border-radius:11px;overflow:hidden}
  dl.props > div{display:grid;grid-template-columns:210px 1fr;border-top:1px solid var(--line-soft)}
  dl.props > div:first-child{border-top:none}
  dl.props dt{background:#f7f9fc;padding:9px 12px;font-family:"IBM Plex Mono",monospace;font-size:18px;color:var(--navy);font-weight:500;border-right:1px solid var(--line-soft)}
  dl.props dd{margin:0;padding:9px 12px;font-size:20px}
  dl.props dd code{font-family:"IBM Plex Mono",monospace;font-size:18px;background:#eef1f7;padding:1px 5px;border-radius:5px}
  @media(max-width:430px){dl.props > div{grid-template-columns:130px 1fr}dl.props dt{font-size:15px;padding:8px 9px}dl.props dd{font-size:18px;padding:8px 10px}}

  .fxlabel{font-family:"IBM Plex Mono",monospace;font-size:16px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin:0 0 5px;font-weight:500}
  .fx{position:relative;margin:0 0 13px}
  .fx code{display:block;background:var(--code-bg);color:var(--code-text);font-family:"IBM Plex Mono",monospace;font-size:18px;line-height:1.55;padding:14px 84px 14px 16px;border-radius:11px;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;border:1px solid #1c3360}
  .fx .copy{position:absolute;top:8px;right:8px;height:34px;min-width:34px;padding:0 11px;border:none;border-radius:8px;background:rgba(224,138,30,.95);color:#1b1206;font-family:"IBM Plex Mono",monospace;font-size:17px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .fx .copy:active{transform:scale(.96)}
  .fx .copy.copied{background:var(--ok);color:#fff}
  .fxgroup{border:1px solid var(--line);border-radius:12px;padding:12px 13px 2px;margin:0 0 14px;background:#fcfdff}
  .fxgroup > .gh{font-family:"IBM Plex Mono",monospace;font-size:17px;font-weight:600;color:var(--navy);margin:0 0 8px;display:flex;align-items:center;gap:8px}
  .fxgroup > .gh::before{content:"";width:10px;height:10px;border-radius:3px;background:var(--amber)}

  .pane{background:#f4f6fb;border:1px solid #dbe2f1;border-left:4px solid var(--navy);border-radius:11px;padding:12px 14px;margin:0 0 13px}
  .pane > .ph{font-family:"IBM Plex Mono",monospace;font-size:15px;letter-spacing:.05em;text-transform:uppercase;color:var(--navy);font-weight:600;margin:0 0 9px;display:flex;align-items:center;gap:7px}
  .pane > .ph::before{content:"\2699";font-size:16px;line-height:1}
  .pane ol,.pane ul{margin:0;padding-left:20px}.pane li{margin:0 0 6px;font-size:19px}
  .pane p{margin:0 0 8px;font-size:19px}
  .pane code{font-family:"IBM Plex Mono",monospace;font-size:17px;background:#e7ecf7;color:var(--navy);padding:1px 6px;border-radius:5px}

  .note{border-radius:11px;padding:12px 14px;margin:0 0 13px;font-size:20px;border:1px solid;line-height:1.55}
  .note b{display:block;font-size:17px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;font-family:"IBM Plex Mono",monospace}
  .note.why{background:#eef2fb;border-color:#d5def3;color:#23365e}.note.why b{color:var(--navy)}
  .note.warn{background:#fbe8cd33;border-color:var(--amber-soft);color:#6b4410}.note.warn b{color:#a4651a}
  .note.tip{background:var(--ok-soft);border-color:#c9e6d6;color:#1c5236}.note.tip b{color:var(--ok)}
  .note.check{background:var(--ok-soft);border-color:#c9e6d6;color:#1c5236}.note.check b{color:var(--ok)}
  .note.check b::before{content:"✅ ";}
  .note code{font-family:"IBM Plex Mono",monospace;font-size:17px;background:rgba(0,0,0,.05);padding:1px 5px;border-radius:5px}

  /* tap-to-copy chips: every code chip outside a dark .fx box is copyable */
  code.cc{cursor:copy;position:relative;-webkit-tap-highlight-color:transparent}
  code.cc::after{content:"⧉";font-size:.78em;margin-left:5px;opacity:.55}
  code.cc.copied{background:var(--ok) !important;color:#fff !important}
  code.cc.copied::after{content:"✓";opacity:1}

  table.cols{width:100%;border-collapse:collapse;margin:0 0 13px;font-size:18px;background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden}
  table.cols th{background:#f7f9fc;font-family:"IBM Plex Mono",monospace;font-size:15px;letter-spacing:.04em;text-transform:uppercase;color:var(--navy);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  table.cols td{padding:7px 10px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  table.cols tr:last-child td{border-bottom:none}

  .done{-webkit-appearance:none;appearance:none;width:100%;min-height:var(--tap);margin-top:6px;border:1.5px solid var(--navy);border-radius:11px;background:#fff;color:var(--navy);font-family:inherit;font-size:21px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:8px}
  .done:active{background:var(--line-soft)}
  details.isdone .done{background:var(--ok);border-color:var(--ok);color:#fff}

  footer{margin:34px 0 10px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:18px;text-align:center;line-height:1.6}
  footer a{color:var(--navy);font-weight:600}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;scroll-behavior:auto !important}}
</style>
</head>
<body>

<header class="mast">
  <div class="wrap mast-inner">
    <div class="brandmark" aria-hidden="true">
      <svg viewBox="0 0 48 48" width="46" height="46" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="16" stroke="rgba(255,255,255,.5)" stroke-width="1.8"/>
        <path d="M16 24l6 6 11-13" stroke="rgba(224,138,30,.95)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="mast-copy">
      <p class="kicker">__PAGE_KICKER__</p>
      <h1>__PAGE_H1__</h1>
      <p class="sub">__PAGE_SUB__</p>
      <div class="meta">
        __PAGE_META_PILLS__
      </div>
    </div>
  </div>
</header>

<div class="sticky">
  <div class="wrap">
    <div class="progress"><i id="bar"></i></div>
    <div class="progtext"><span id="progLabel">0 of __STEP_COUNT__ steps done</span><button id="reset" type="button">Reset</button></div>
  </div>
</div>

<main class="wrap">

  <!-- ============================================================
       CANONICAL STEP BLOCK — copy this anatomy for every step.
       - id: lowercase step id (a1, b3, c5 …)
       - .num text: the step id uppercase (A1, B3, C5 …)
       - every dark formula box: .fxlabel (Control · Property) then .fx with Copy button
       - every control name / property value in prose: <code class="cc">…</code> (tap-to-copy)
       - callouts: .note.why (explanation) .note.warn (gotcha) .note.tip (nice-to-know)
       - ALWAYS end with .note.check ("Check before moving on") then button.done
       - HTML-escape formulas: &amp; &lt; &gt; — the copied text must be the exact formula.

  <details class="step" id="a1" open>
    <summary><span class="dot"></span><span class="num">A1</span><span class="stitle">Step title</span><svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></summary>
    <div class="body">
      <p class="do">Instruction with a tap-to-copy chip: <code class="cc">galSystems</code>.</p>
      <ol class="steps2">
        <li>Sub-step one.</li>
        <li>Sub-step two.</li>
      </ol>
      <p class="fxlabel">controlName · Property</p>
      <div class="fx"><button class="copy" type="button">Copy</button><code>Formula here</code></div>
      <div class="note why"><b>Why</b>Explanation.</div>
      <div class="note check"><b>Check before moving on</b>Verification.</div>
      <button class="done" type="button">Mark step done</button>
    </div>
  </details>
  ============================================================ -->

  __PAGE_CONTENT__

  <footer>
    __PAGE_FOOTER_LINE__<br>
    The series: &nbsp;__SERIES_LINKS__
  </footer>
</main>

<script>
(function(){
  "use strict";
  var mem={};
  var store={
    get:function(k){try{return localStorage.getItem(k);}catch(e){return (k in mem)?mem[k]:null;}},
    set:function(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}},
    del:function(k){try{localStorage.removeItem(k);}catch(e){delete mem[k];}}
  };
  var KEY="__STORAGE_KEY__";

  function fallbackCopy(t){var ta=document.createElement("textarea");ta.value=t;ta.setAttribute("readonly","");ta.style.position="fixed";ta.style.top="-1000px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}
  function copyText(text,onDone){
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(onDone,function(){fallbackCopy(text);onDone();});}
    else{fallbackCopy(text);onDone();}
  }
  document.querySelectorAll(".fx .copy").forEach(function(btn){
    btn.addEventListener("click",function(){
      var code=btn.parentElement.querySelector("code");
      copyText(code?code.textContent:"",function(){
        btn.classList.add("copied");btn.textContent="✓";
        setTimeout(function(){btn.classList.remove("copied");btn.textContent="Copy";},1300);
      });
    });
  });
  document.querySelectorAll("code.cc").forEach(function(chip){
    chip.setAttribute("title","Tap to copy");
    chip.addEventListener("click",function(){
      copyText(chip.textContent,function(){
        chip.classList.add("copied");
        setTimeout(function(){chip.classList.remove("copied");},1100);
      });
    });
  });

  var steps=Array.prototype.slice.call(document.querySelectorAll("details.step"));
  var total=steps.length;
  var bar=document.getElementById("bar");
  var label=document.getElementById("progLabel");
  function loadDone(){var raw=store.get(KEY);if(!raw)return {};try{return JSON.parse(raw)||{};}catch(e){return {};}}
  function saveDone(obj){store.set(KEY,JSON.stringify(obj));}
  var doneMap=loadDone();
  function refreshProgress(){
    var n=0;
    steps.forEach(function(d){if(d.classList.contains("isdone"))n++;});
    bar.style.width=(total?Math.round(n/total*100):0)+"%";
    label.textContent=n+" of "+total+" steps done";
  }
  steps.forEach(function(d){
    if(doneMap[d.id])d.classList.add("isdone");
    var btn=d.querySelector(".done");
    function syncBtn(){btn.textContent=d.classList.contains("isdone")?"✓ Done — tap to undo":"Mark step done";}
    syncBtn();
    btn.addEventListener("click",function(){d.classList.toggle("isdone");doneMap[d.id]=d.classList.contains("isdone");saveDone(doneMap);syncBtn();refreshProgress();});
  });
  refreshProgress();
  document.getElementById("reset").addEventListener("click",function(){
    steps.forEach(function(d){d.classList.remove("isdone");d.querySelector(".done").textContent="Mark step done";});
    doneMap={};store.del(KEY);refreshProgress();
  });
})();
</script>
</body>
</html>
